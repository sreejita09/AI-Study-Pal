<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App icon background with rounded corners -->
  <rect width="512" height="512" rx="88" fill="#0b0b0f"/>

  <!-- Icon: AI spark diamond + open book -->
  <g fill="#facc15" filter="url(#glow)">

    <!-- Diamond / AI spark above the book -->
    <polygon points="256,122 280,150 256,178 232,150"/>

    <!-- Thin connector: diamond to book spine -->
    <rect x="252" y="178" width="8" height="20" rx="4"/>

    <!--
      Left page of open book.
      Flat edge on the right (x=252, the spine side).
      Curves out to the left, peaking at x=118 at mid-height.
      Path: start top-right → cubic to left-mid → cubic to bottom-right → Z (straight line back up = spine)
    -->
    <path d="
      M 252 197
      C 218 197 118 232 118 290
      C 118 348 218 383 252 383
      Z
    "/>

    <!--
      Right page of open book (mirror image).
      Flat edge on the left (x=260, the spine side).
      Curves out to the right, peaking at x=394 at mid-height.
    -->
    <path d="
      M 260 197
      C 294 197 394 232 394 290
      C 394 348 294 383 260 383
      Z
    "/>

  </g>
</svg>
