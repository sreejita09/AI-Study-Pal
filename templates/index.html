<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Pal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.4.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-book"></i> AI Study Pal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <span class="navbar-text ms-auto me-3">Smart study planning & quiz generator</span>
                <div id="userNav" class="d-flex align-items-center">
                    <span id="userName" class="me-3"></span>
                    <button id="logoutBtn" class="btn btn-sm btn-light" style="display:none;">Logout</button>
                    <button id="loginBtn" class="btn btn-sm btn-light" data-bs-toggle="modal" data-bs-target="#authModal" style="display:none;">Login</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Alert Container -->
    <div id="alertContainer" class="container mt-3"></div>

    <!-- Auth Modal -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login / Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="loginTab" data-bs-toggle="tab" data-bs-target="#loginPanel">Login</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="registerTab" data-bs-toggle="tab" data-bs-target="#registerPanel">Register</button>
                        </li>
                    </ul>
                    
                    <!-- Login Form -->
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="loginPanel">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" name="username" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <input type="password" class="form-control" name="password" id="loginPasswordModal" required>
                                        <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('loginPasswordModal', this)">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" name="remember" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Remember me</label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </form>
                        </div>
                        
                        <!-- Register Form -->
                        <div class="tab-pane fade" id="registerPanel">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        name="username"
                                        id="registerUsernameModal"
                                        required
                                        minlength="3"
                                        oninput="checkUsernameAvailabilityModal()"
                                    >
                                    <small id="usernameStatusModal" class="form-text text-muted"></small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" name="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="input-group">
                                        <input
                                            type="password"
                                            class="form-control"
                                            name="password"
                                            id="registerPasswordModal"
                                            required
                                            minlength="8"
                                            oninput="checkPasswordStrengthModal()"
                                        >
                                        <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('registerPasswordModal', this)">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                    <div id="passwordStrengthModal" class="mt-2" style="display:none;">
                                        <div class="progress" style="height: 6px;">
                                            <div id="strengthBarModal" class="progress-bar" style="width: 0%;"></div>
                                        </div>
                                        <div class="d-flex justify-content-between mt-2">
                                            <small id="strengthLevelModal" class="text-muted">Weak</small>
                                            <small class="text-muted">Use 8+ chars, upper, lower, number or symbol</small>
                                        </div>
                                        <small id="strengthFeedbackModal" class="d-block mt-1 text-muted"></small>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Register</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="contentArea">
            <!-- Content will load here after login -->
        </div>
    </div>

    <!-- Loading Spinner Template -->
    <template id="spinnerTemplate">
        <div class="text-center my-3">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-2">Processing your request...</p>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.4.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/';
        const alertContainer = document.getElementById('alertContainer');
        const contentArea = document.getElementById('contentArea');

        // Show alert
        function showAlert(message, type = 'danger') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.role = 'alert';
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.appendChild(alert);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => alert.remove(), 5000);
        }

        // Show loading spinner
        function showSpinner() {
            const spinner = document.getElementById('spinnerTemplate').content.cloneNode(true);
            return spinner;
        }

        function closeAuthModalIfAvailable() {
            const modalElement = document.getElementById('authModal');
            if (!modalElement) return;

            if (window.bootstrap && window.bootstrap.Modal) {
                const instance = window.bootstrap.Modal.getInstance(modalElement);
                if (instance) {
                    instance.hide();
                    return;
                }
            }

            modalElement.classList.remove('show');
            modalElement.style.display = 'none';
            document.body.classList.remove('modal-open');
            document.querySelectorAll('.modal-backdrop').forEach(backdrop => backdrop.remove());
        }

        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (!input || !icon) return;

            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }

        let usernameCheckTimeoutModal;
        async function checkUsernameAvailabilityModal() {
            const username = document.getElementById('registerUsernameModal').value.trim();
            const statusDiv = document.getElementById('usernameStatusModal');

            if (username.length < 3) {
                statusDiv.textContent = '';
                return;
            }

            clearTimeout(usernameCheckTimeoutModal);
            usernameCheckTimeoutModal = setTimeout(async () => {
                try {
                    const res = await fetch('/auth/check-username', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username })
                    });
                    const data = await res.json();

                    if (data.available) {
                        statusDiv.textContent = 'Username available';
                        statusDiv.className = 'form-text text-success';
                    } else {
                        statusDiv.textContent = 'Username already taken';
                        statusDiv.className = 'form-text text-danger';
                    }
                } catch (error) {
                    statusDiv.textContent = '';
                }
            }, 350);
        }

        async function checkPasswordStrengthModal() {
            const password = document.getElementById('registerPasswordModal').value;
            const wrapper = document.getElementById('passwordStrengthModal');
            const bar = document.getElementById('strengthBarModal');
            const level = document.getElementById('strengthLevelModal');
            const feedback = document.getElementById('strengthFeedbackModal');

            if (!password) {
                wrapper.style.display = 'none';
                return;
            }

            try {
                const res = await fetch('/auth/check-password-strength', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                wrapper.style.display = 'block';

                const widthMap = {0: '0%', 1: '20%', 2: '40%', 3: '60%', 4: '80%', 5: '100%', 6: '100%'};
                const colorMap = {
                    weak: 'bg-danger',
                    medium: 'bg-warning',
                    strong: 'bg-success',
                    empty: 'bg-secondary'
                };

                bar.style.width = widthMap[data.score] || '0%';
                bar.className = `progress-bar ${colorMap[data.level] || 'bg-danger'}`;
                level.textContent = data.level.charAt(0).toUpperCase() + data.level.slice(1);
                feedback.textContent = data.feedback && data.feedback.length
                    ? `Tips: ${data.feedback.join(', ')}`
                    : 'Strong password';
            } catch (error) {
                wrapper.style.display = 'none';
            }
        }

        // Check authentication status
        async function checkAuth() {
            try {
                const res = await fetch('/auth/check');
                const data = await res.json();
                
                if (data.authenticated) {
                    document.getElementById('userName').textContent = `Welcome, ${data.user.username}!`;
                    document.getElementById('logoutBtn').style.display = 'block';
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('authModal').modal = null;
                    loadMainContent();
                } else {
                    document.getElementById('loginBtn').style.display = 'block';
                    document.getElementById('logoutBtn').style.display = 'none';
                    document.getElementById('userName').textContent = '';
                    contentArea.innerHTML = '<p class="text-center text-muted mt-5">Please log in to access features.</p>';
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
        }

        // Load main content
        function loadMainContent() {
            contentArea.innerHTML = `
                <div class="row mb-4">
                    <div class="col-lg-12">
                        <div class="card shadow-sm mb-3">
                            <div class="card-body">
                                <h4><i class="bi bi-file-earmark-text"></i> Upload a text file</h4>
                                <p class="text-muted">Use file or text input for all features.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Study Plan Card -->
                    <div class="col-xl-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-calendar3"></i> Study Plan</h5>
                                <form class="study-form" data-endpoint="/generate_plan" data-output="plan-output">
                                    <div class="mb-3">
                                        <label class="form-label">Subject</label>
                                        <input class="form-control" name="subject" placeholder="Enter subject" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Study Hours</label>
                                        <input class="form-control" name="hours" type="number" min="1" max="168" value="5" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Upload File (Optional)</label>
                                        <input class="form-control" type="file" name="file" accept=".txt,.md,.csv,.pdf">
                                    </div>
                                    <button class="btn btn-success w-100" type="submit">
                                        <i class="bi bi-play-circle"></i> Create Plan
                                    </button>
                                </form>
                                <div id="plan-output" class="mt-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Quiz Generator Card -->
                    <div class="col-xl-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-question-circle"></i> Quiz Generator</h5>
                                <form class="study-form" data-endpoint="/generate_quiz" data-output="quiz-output">
                                    <div class="mb-3">
                                        <label class="form-label">Text or Content</label>
                                        <textarea class="form-control" name="text" rows="2" placeholder="Paste your text here"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Difficulty</label>
                                        <select class="form-select" name="difficulty">
                                            <option value="easy">Easy</option>
                                            <option value="medium">Medium</option>
                                            <option value="hard">Hard</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Upload File (Optional)</label>
                                        <input class="form-control" type="file" name="file" accept=".txt,.md,.csv,.pdf">
                                    </div>
                                    <button class="btn btn-primary w-100" type="submit">
                                        <i class="bi bi-pencil-square"></i> Generate Quiz
                                    </button>
                                </form>
                                <div id="quiz-output" class="mt-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Summarize Card -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-file-text"></i> Summarize Text</h5>
                                <form class="study-form" data-endpoint="/summarize" data-output="summary-output">
                                    <div class="mb-3">
                                        <label class="form-label">Text</label>
                                        <textarea class="form-control" name="text" rows="3" placeholder="Paste text to summarize"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Upload File (Optional)</label>
                                        <input class="form-control" type="file" name="file" accept=".txt,.md,.csv,.pdf">
                                    </div>
                                    <button class="btn btn-outline-secondary w-100" type="submit">
                                        <i class="bi bi-arrows-collapse"></i> Summarize
                                    </button>
                                </form>
                                <div id="summary-output" class="mt-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Study Tips Card -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-lightbulb"></i> Study Tips</h5>
                                <form class="study-form" data-endpoint="/generate_tips" data-output="tips-output">
                                    <div class="mb-3">
                                        <label class="form-label">Text</label>
                                        <textarea class="form-control" name="text" rows="3" placeholder="Paste text to get tips"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Upload File (Optional)</label>
                                        <input class="form-control" type="file" name="file" accept=".txt,.md,.csv,.pdf">
                                    </div>
                                    <button class="btn btn-outline-secondary w-100" type="submit">
                                        <i class="bi bi-star"></i> Get Tips
                                    </button>
                                </form>
                                <div id="tips-output" class="mt-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Feedback Card -->
                    <div class="col-lg-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-heart"></i> Feedback</h5>
                                <form class="study-form" data-endpoint="/generate_feedback" data-output="feedback-output">
                                    <div class="mb-3">
                                        <label class="form-label">Study Hours</label>
                                        <input class="form-control" name="hours" type="number" min="1" max="168" value="5" required>
                                    </div>
                                    <button class="btn btn-warning w-100" type="submit">
                                        <i class="bi bi-chat-dots"></i> Get Feedback
                                    </button>
                                </form>
                                <div id="feedback-output" class="mt-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Attach event listeners to forms
            attachFormListeners();
        }

        // Handle form submissions
        function attachFormListeners() {
            document.querySelectorAll('.study-form').forEach(form => {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const endpoint = form.dataset.endpoint;
                    const outputId = form.dataset.output;
                    const outputEl = document.getElementById(outputId);
                    
                    // Show spinner
                    outputEl.innerHTML = '';
                    outputEl.appendChild(showSpinner());
                    
                    try {
                        const formData = new FormData(form);
                        const res = await fetch(endpoint, {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await res.json();
                        
                        if (!res.ok) {
                            throw new Error(data.error || 'Request failed');
                        }
                        
                        // Format output based on endpoint
                        let html = '';
                        if (endpoint === '/generate_plan') {
                            html = `
                                <div class="alert alert-success">
                                    <pre class="mb-0">${escapeHtml(data.plan)}</pre>
                                </div>
                                <a class="btn btn-sm btn-outline-success" href="${data.csv}" download>
                                    <i class="bi bi-download"></i> Download CSV
                                </a>
                            `;
                        } else if (endpoint === '/generate_quiz') {
                            html = '<div class="list-group">';
                            if (Array.isArray(data.quiz)) {
                                data.quiz.forEach((q, idx) => {
                                    html += `
                                        <div class="list-group-item">
                                            <p class="mb-2"><strong>Q${idx + 1}: ${escapeHtml(q.question || '')}</strong></p>
                                            ${Array.isArray(q.options) ? `
                                                <div class="ps-3">
                                                    ${q.options.map((opt, i) => `<div><input type="radio" name="q${idx}"> ${escapeHtml(opt)}</div>`).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    `;
                                });
                            }
                            html += '</div>';
                        } else if (endpoint === '/summarize') {
                            html = `
                                <div class="alert alert-info">
                                    <strong>Summary:</strong>
                                    <p class="mb-0 mt-2">${escapeHtml(data.summary)}</p>
                                </div>
                            `;
                        } else if (endpoint === '/generate_tips') {
                            html = `
                                <div class="alert alert-info">
                                    <strong><i class="bi bi-star"></i> Study Tips:</strong>
                                    <p class="mb-0 mt-2">${escapeHtml(data.tips)}</p>
                                </div>
                            `;
                        } else if (endpoint === '/generate_feedback') {
                            html = `
                                <div class="alert alert-warning">
                                    <i class="bi bi-heart"></i> <strong>Feedback:</strong>
                                    <p class="mb-0 mt-2">${escapeHtml(data.feedback)}</p>
                                </div>
                            `;
                        }
                        
                        outputEl.innerHTML = html;
                        showAlert('Success! Your request has been processed.', 'success');
                        
                    } catch (err) {
                        outputEl.innerHTML = '';
                        showAlert(err.message || 'An error occurred', 'danger');
                    }
                });
            });
        }

        // Escape HTML
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                username: formData.get('username'),
                password: formData.get('password'),
                remember: formData.get('remember') === 'on'
            };
            
            try {
                const res = await fetch('/auth/login-api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const contentType = res.headers.get('content-type') || '';
                const result = contentType.includes('application/json')
                    ? await res.json()
                    : { error: 'Unexpected server response. Please refresh and try again.' };
                
                if (res.ok) {
                    showAlert('Login successful!', 'success');
                    closeAuthModalIfAvailable();
                    checkAuth();
                } else {
                    showAlert(result.error || 'Login failed', 'danger');
                }
            } catch (err) {
                showAlert('Login error: ' + err.message, 'danger');
            }
        });

        // Handle register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                username: formData.get('username'),
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const contentType = res.headers.get('content-type') || '';
                const result = contentType.includes('application/json')
                    ? await res.json()
                    : { error: 'Unexpected server response. Please refresh and try again.' };
                
                if (res.ok) {
                    showAlert(
                        result.message || 'Registration successful! Please verify your email before logging in.',
                        'success'
                    );
                    document.getElementById('registerForm').reset();
                    document.getElementById('loginTab').click();
                } else {
                    showAlert(result.error || 'Registration failed', 'danger');
                }
            } catch (err) {
                showAlert('Registration error: ' + err.message, 'danger');
            }
        });

        // Handle logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                const res = await fetch('/auth/logout', {method: 'POST'});
                if (res.ok) {
                    showAlert('Logged out successfully', 'info');
                    checkAuth();
                }
            } catch (err) {
                showAlert('Logout error', 'danger');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
